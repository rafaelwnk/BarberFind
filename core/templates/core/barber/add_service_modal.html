<div class="modal fade" id="addServiceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Selecionar Serviços</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="modal-body d-flex flex-column gap-2">
                    {% for service in all_services %}
                    <label class="d-flex align-items-center justify-content-between p-2 border rounded"
                        style="cursor: pointer;">
                        <div>
                            <strong>{{ service.title }}</strong>
                            <span class="text-muted ms-2" style="font-size: 13px;">
                                R$ {{ service.price }} · {{ service.duration }} min
                            </span>
                        </div>
                        <input type="checkbox" name="services" value="{{ service.id }}" class="form-check-input ms-3" {% if service.id in barber_service_ids %}checked{% endif %}>
                    </label>
                    {% empty %}
                    <p class="text-muted">Nenhum serviço cadastrado.</p>
                    {% endfor %}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
